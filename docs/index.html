<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor de Playas de El Salvador</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" aria-label="Listado de playas">
        <div class="sidebar-header">
          <h1>Proyectos Realizados</h1>
          <button id="fit-all-btn" type="button">Ajustar a todos</button>
        </div>


        <p id="beach-count" class="count-badge">Playas cargadas: 0</p>
        <details id="beach-list-panel" class="beach-panel" open>
          <summary>Lista de playas</summary>
          <ul id="beach-list" class="beach-list" aria-label="Lista de playas"></ul>
        </details>
      </aside>

      <main class="map-wrapper">
        <div id="map" aria-label="Mapa de playas"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
