<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor de Playas de El Salvador</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar" aria-label="Listado de playas">
        <div class="sidebar-header">
          <h1>Playas de El Salvador</h1>
          <button id="fit-all-btn" type="button">Ajustar a todos</button>
        </div>

        <p id="google-warning" class="notice hidden" role="status" aria-live="polite">
          Google requiere API key. Se usa OpenStreetMap como capa base.
        </p>

        <p id="beach-count" class="count-badge">Playas cargadas: 0</p>
        <ul id="beach-list" class="beach-list" aria-label="Lista de playas"></ul>
      </aside>

      <main class="map-wrapper">
        <div id="map" aria-label="Mapa de playas"></div>
      </main>
    </div>

    <script>
      // Define esta variable con tu API key de Google Maps si deseas usar la capa Google.
      // Ejemplo: window.GOOGLE_MAPS_API_KEY = "TU_API_KEY";
      window.GOOGLE_MAPS_API_KEY = window.GOOGLE_MAPS_API_KEY || "";
    </script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.gridlayer.googlemutant@0.13.5/Leaflet.GoogleMutant.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
